name: 👻 BOSS RAID (pac-man graph)

# 잔디를 팩맨이 먹어치우는 SVG를 output 브랜치에 생성한다.
# README는 raw.githubusercontent.com/.../output/... 경로로 이 결과물을 참조.

on:
  schedule:
    - cron: '30 18 * * *' # 18:30 UTC = 03:30 KST
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/pacman.yml'

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Generate pac-man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
